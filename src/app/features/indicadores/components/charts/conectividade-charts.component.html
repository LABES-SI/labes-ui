<div class="charts-container">
  @if (graficosAnaliseTemporal.length > 0) {
    <section class="graficos-section graficos-section--temporal">
      @for (grafico of graficosAnaliseTemporal; track grafico.chave) {
        <app-grafico-card [titulo]="grafico.titulo">
          <plotly-plot
            [data]="grafico.plotly.data"
            [layout]="grafico.plotly.layout"
            [useResizeHandler]="true"
            [style]="{
              position: 'relative',
              width: '100%',
              height: '320px',
            }"
          ></plotly-plot>
        </app-grafico-card>
      }
    </section>
  }

  @if (graficos.length > 0) {
    <section class="graficos-section">
      @for (grafico of graficos; track grafico.titulo; let i = $index) {
        <app-grafico-card [titulo]="grafico.titulo" [class.grafico-card-host--compact]="i < 2">
          <plotly-plot
            [data]="grafico.plotly.data"
            [layout]="grafico.plotly.layout"
            [useResizeHandler]="true"
            [style]="{
              position: 'relative',
              width: '100%',
              height: i < 2 ? '240px' : '340px',
            }"
          ></plotly-plot>
        </app-grafico-card>
      }
    </section>
  }
</div>
