<div class="acessibilidade-page">
  <div class="filter-bar">
    <div class="filter-item">
      <label>Ano:</label>
      <select [value]="selectedAno ?? ''" (change)="onAnoChange($event)">
        @for (a of anos; track a) {
          <option [value]="a">{{ a }}</option>
        }
      </select>
    </div>

    <div class="filter-item">
      <label>Município:</label>
      <select multiple (change)="onMunicipioChange($event)">
        @for (municipio of municipios; track municipio.nome) {
          <option [value]="municipio.nome" [selected]="selectedMunicipios.includes(municipio.nome)">
            {{ municipio.nome }}
          </option>
        }
      </select>
    </div>

    <div class="filter-item">
      <label>Rede de Ensino:</label>
      <select multiple (change)="onRedeEnsinoChange($event)">
        @for (rede of redesEnsino; track rede) {
          <option [value]="rede" [selected]="selectedRedeEnsino.includes(rede)">
            {{ rede }}
          </option>
        }
      </select>
    </div>

    <div class="filter-item">
      <label>Tipo de Localização:</label>
      <select multiple (change)="onTpLocalizacaoChange($event)">
        @for (localizacao of tpLocalizacoes; track localizacao) {
          <option [value]="localizacao" [selected]="selectedTpLocalizacao.includes(localizacao)">
            {{ localizacao }}
          </option>
        }
      </select>
    </div>

    <div class="filter-item">
      <label>Métricas:</label>
      <div class="metricas-list">
        @for (m of metricas; track m.chave) {
          <label>
            <input
              type="checkbox"
              [checked]="selectedMetricas.includes(m.chave)"
              (change)="onMetricaChange(m.chave, $event)"
            />
            {{ m.label }}
          </label>
        }
      </div>
    </div>

    <div class="filter-actions">
      <button (click)="aplicarFiltros()">Aplicar</button>
      <button (click)="resetFiltros()" class="btn-reset">Reset</button>
    </div>
  </div>

  <div class="search-bar">
    <input
      type="text"
      placeholder="Pesquisar nome da escola..."
      [(ngModel)]="searchTerm"
      (keyup.enter)="buscarEscola()"
    />
    <button (click)="buscarEscola()">Buscar</button>
    <button (click)="fecharPopups()">Fechar pop-ups</button>
    @if (searchResults.length > 0) {
      <div class="search-results">
        @for (escola of searchResults; track escola.co_entidade) {
          <div class="search-result-item">
            <span class="escola-nome">{{ escola.nome }}</span>
            <span class="escola-municipio">{{ escola.municipio }}</span>
            <button class="btn-mostrar" (click)="mostrarEscola(escola)">Mostrar</button>
          </div>
        }
      </div>
    }
  </div>

  <div>
    <div #mapContainer style="height: 70vh; width: 100%"></div>
  </div>

  @if (graficos.length > 0) {
    <section class="graficos-section">
      @for (grafico of graficos; track grafico.titulo) {
        <app-grafico-card [titulo]="grafico.titulo">
          <plotly-plot
            [data]="grafico.plotly.data"
            [layout]="grafico.plotly.layout"
            [useResizeHandler]="true"
            [style]="{
              position: 'relative',
              width: '100%',
              height: '360px',
            }"
          ></plotly-plot>
        </app-grafico-card>
      }
    </section>
  }
</div>
