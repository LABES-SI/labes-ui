<section class="fontes-dados-section" aria-labelledby="fontes-dados-title">
  <header class="section-header">
    <span class="eyebrow">FONTES DE DADOS</span>
    <h2 id="fontes-dados-title">De onde vêm os dados do SIE?</h2>
    <p class="subtitle">
      O SIE integra informações de bases oficiais e reconhecidas nacionalmente.
    </p>
  </header>

  <div class="cards-grid">
    @for (fonte of fontes; track fonte.titulo) {
      <article class="card">
        <div class="icon-wrapper" aria-hidden="true">
          @switch (fonte.titulo) {
            @case ('Censo Escolar') {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="m4 6 8-4 8 4" />
                <path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2" />
                <path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4" />
                <path d="M18 5v17" />
                <path d="M6 5v17" />
                <circle cx="12" cy="9" r="2" />
              </svg>
            }
            @case ('PIBID') {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
                <path d="M6 12v5c3 3 9 3 12 0v-5" />
              </svg>
            }
          }
        </div>
        <h3 class="card-title">{{ fonte.titulo }}</h3>
        <p class="card-description">{{ fonte.descricao }}</p>
      </article>
    }
  </div>
</section>
