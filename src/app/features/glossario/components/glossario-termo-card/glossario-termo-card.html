<article class="termo-card" [attr.id]="termo().id">
  <div class="termo-header">
    <div class="header-titles">
      <code class="db-key">{{ termo().chaveOriginal }}</code>
      <h3>{{ termo().termo }}</h3>
    </div>

    <span class="badge" [ngClass]="termo().categoria">
      {{ getCategoriaLabel() }}
    </span>
  </div>

  <div class="termo-content">
    <p class="definicao">{{ termo().definicao }}</p>

    @if (termo().exemplo) {
      <p class="exemplo"><strong>Exemplo:</strong> {{ termo().exemplo }}</p>
    }
  </div>

  @if (termo().referenciaInep; as referencia) {
    @if (referencia.url) {
      <div class="termo-footer">
        <a
          [href]="referencia.url"
          target="_blank"
          rel="noopener noreferrer"
          class="link-inep"
          [attr.aria-label]="'Abrir ' + (referencia.texto || 'Metodologia INEP') + ' em nova aba'"
        >
          {{ referencia.texto || 'Metodologia INEP' }}
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        </a>
      </div>
    }
  }
</article>
