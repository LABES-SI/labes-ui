<header class="header">
  <div class="header-inner">
    <a class="brand" routerLink="/inicio" aria-label="SIE - página inicial">
      <span class="brand-mark">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </span>
      <strong>SIE</strong>
      <span>Síntese de Indicadores Educacionais</span>
    </a>

    <nav class="nav" aria-label="Navegação principal">
      @for (link of links; track link.label) {
        <a
          [routerLink]="link.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.exact }"
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </div>
</header>
