<header class="header">
  <div class="header-inner">
    <a class="brand" routerLink="/inicio" aria-label="SIE - página inicial">
      <span class="brand-mark">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </span>
      <strong>SIE</strong>
      <span>Síntese de Indicadores Educacionais</span>
    </a>

    <button
      class="menu-toggle"
      [class.open]="menuAberto()"
      type="button"
      aria-label="Abrir ou fechar menu"
      [attr.aria-expanded]="menuAberto()"
      aria-controls="main-navigation"
      (click)="alternarMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav
      id="main-navigation"
      class="nav"
      [class.nav-open]="menuAberto()"
      aria-label="Navegação principal"
    >
      @for (link of links; track link.label) {
        <a
          [routerLink]="link.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: link.exact }"
          (click)="fecharMenu()"
        >
          {{ link.label }}
        </a>
      }
    </nav>
  </div>
</header>
